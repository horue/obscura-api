<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obscura API</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 600px; margin: 80px auto; padding: 0 20px; background: #0d1318; color: #e0e0e0; line-height: 1.6; }
  h1 { font-size: 1.8rem; margin-bottom: 4px; }
  h2 { font-size: 1.1rem; color: #f44336; font-weight: 400; margin-top: 0; }
  .endpoint { background: #1c2126; border: 1px solid #252b2f; border-radius: 8px; padding: 16px 20px; margin: 20px 0; }
  .endpoint code { background: #2e3337; padding: 2px 8px; border-radius: 4px; font-size: 0.9rem; }
  .tag { display: inline-block; font-size: 0.75rem; font-weight: 600; padding: 2px 10px; border-radius: 4px; margin-right: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .tag-post { background: #1a4731; color: #4ade80; }
  hr { border: none; border-top: 1px solid #252b2f; margin: 40px 0; }
  a { color: #f44336; }
</style>
</head>
<body>
  <h1>Obscura API</h1>
  <h2>Endpoints para integração com a newsletter Obscura</h2>

  <div class="endpoint">
    <strong><span class="tag tag-post">POST</span> <code>/api/subscribe</code></strong>
    <p style="margin: 8px 0 0">Inscreve um email na newsletter Obscura (Substack).</p>
    <p style="margin: 4px 0 0; font-size: 0.85rem; color: #9ea1a3;">
      <strong>Body:</strong> <code>{"email": "usuario@email.com"}</code><br>
      <strong>Resposta:</strong> <code>{"ok": true}</code>
    </p>
  </div>

  <hr>
  <p style="font-size: 0.8rem; color: #515659"><a href="https://www.aobscura.com.br">Obscura</a> · <a href="https://github.com/renatorochamiranda/obscura-api">GitHub</a></p>
</body>
</html>
